<div class="d-flex justify-content-between align-items-center mb-3">
  <mat-form-field appearance="outline">
    <mat-label>Search provinces</mat-label>
    <input matInput [(ngModel)]="filterText" placeholder="Filter"/>
  </mat-form-field>
  <div>
    <button mat-icon-button color="primary" (click)="openAddDialog()">
      <mat-icon>add_circle</mat-icon>
    </button>
    <button mat-icon-button (click)="refresh()">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>
</div>

<table mat-table [dataSource]="filteredData" class="table table-striped mat-elevation-z2">
  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let prov">{{ prov.id }}</td>
  </ng-container>
  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let prov">{{ prov.name }}</td>
  </ng-container>
  <!-- Actions (optional) -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let prov">
      <button mat-icon-button color="accent">
        <mat-icon>edit</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols;"></tr>
</table>
